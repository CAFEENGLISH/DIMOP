<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIMOP Plusz - Pályázati Checklist</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✅</text></svg>">
  <style>
    .cl-progress { background: var(--gray-100); border-radius: 12px; padding: 20px 24px; margin-bottom: 24px; text-align: center; }
    .cl-progress-bar { background: var(--gray-200); border-radius: 8px; height: 12px; margin-top: 10px; overflow: hidden; }
    .cl-progress-fill { background: var(--green); height: 100%; border-radius: 8px; transition: width .4s ease; }
    .cl-progress-text { font-size: 18px; font-weight: 700; color: var(--blue-dark); }
    .cl-progress-sub { font-size: 13px; color: var(--gray-500); margin-top: 4px; }
    .cl-card { background: #fff; border: 2px solid var(--gray-200); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 14px; transition: border-color .2s, box-shadow .2s; cursor: pointer; }
    .cl-card:hover { border-color: var(--accent); box-shadow: 0 2px 8px rgba(0,80,180,.08); }
    .cl-card.done { border-color: var(--green); background: #f0fdf4; }
    .cl-card input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--green); margin-top: 2px; cursor: pointer; flex-shrink: 0; }
    .cl-card-body { flex: 1; min-width: 0; }
    .cl-card-title { font-size: 15px; font-weight: 700; color: var(--gray-900); margin-bottom: 4px; }
    .cl-card.done .cl-card-title { text-decoration: line-through; color: var(--gray-500); }
    .cl-card-desc { font-size: 13px; color: var(--gray-600); line-height: 1.5; }
    .cl-card-link { display: inline-block; margin-top: 6px; font-size: 12px; color: var(--accent); text-decoration: none; }
    .cl-card-link:hover { text-decoration: underline; }
    .cl-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; }
    .cl-badge-req { background: #fee2e2; color: #dc2626; }
    .cl-badge-opt { background: #fef3c7; color: #d97706; }
    .cl-badge-auto { background: #dbeafe; color: #2563eb; }
    .cl-section { margin-top: 32px; }
    .cl-section h2 { font-size: 18px; font-weight: 700; color: var(--blue-dark); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--blue-light); }
    .cl-notes { width: 100%; min-height: 80px; border: 1px solid var(--gray-300); border-radius: 8px; padding: 12px; font-size: 14px; font-family: inherit; resize: vertical; }
    .cl-notes:focus { border-color: var(--accent); outline: none; }
    .cl-tip { background: #fffbeb; border-left: 4px solid #f59e0b; padding: 12px 16px; border-radius: 0 8px 8px 0; margin-bottom: 16px; font-size: 13px; color: #92400e; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/" style="color:#fff;text-decoration:none;font-size:24px;margin-right:12px" title="Vissza a tudásbázisra">&#8249;</a>
        <div class="logo">DIMOP<span>+</span></div>
        <div class="header-text">
          <h1>Pályázati Checklist</h1>
          <p>DIMOP Plusz-1.2.6/B-26 &mdash; Benyújtandó dokumentumok</p>
        </div>
      </div>
      <div class="header-right">
        <span class="badge">12M Ft</span>
        <span class="badge badge-green">B-26</span>
      </div>
    </div>
  </header>

  <main class="calc-page">
    <!-- Progress -->
    <div class="cl-progress">
      <div class="cl-progress-text" id="progressText">0 / 7 dokumentum kész</div>
      <div class="cl-progress-sub">Jelöld be ami megvan!</div>
      <div class="cl-progress-bar"><div class="cl-progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>

    <div class="cl-tip">
      <strong>Tipp:</strong> A jelölések automatikusan mentődnek a böngészőben. Bármikor visszatérhetsz és folytathatod!
    </div>

    <!-- Checklist cards -->
    <div class="cl-section">
      <h2>Csatolandó dokumentumok</h2>
      <div id="checklistCards"></div>
    </div>

    <!-- Notes -->
    <div class="cl-section">
      <h2>Megjegyzések</h2>
      <textarea class="cl-notes" id="clNotes" placeholder="Írj ide bármit amit meg szeretnél jegyezni a pályázattal kapcsolatban..."></textarea>
    </div>
  </main>

  <script>
  const ITEMS = [
    {
      id: 'dig-szint',
      title: 'Digitális intenzitási szint igazolás',
      desc: 'A kkvdigital.dkf.hu oldalon kitöltött 26 kérdéses felmérés eredménye. Cégszerűen hitelesített, eredeti példány szükséges. Max. 60 nappal a benyújtás előtt lehet kitölteni!',
      link: 'https://kkvdigital.dkf.hu',
      linkText: 'Kitöltés: kkvdigital.dkf.hu',
      badge: 'req', badgeText: 'Kötelező'
    },
    {
      id: 'kozossegi',
      title: 'Közösségi mutató igazolás',
      desc: 'Automatikusan készül a digitális szintfelmérővel együtt. Ugyanúgy le kell tölteni és cégszerűen hitelesíteni!',
      link: 'https://kkvdigital.dkf.hu',
      linkText: 'Ugyanonnan: kkvdigital.dkf.hu',
      badge: 'req', badgeText: 'Kötelező'
    },
    {
      id: 'kkv',
      title: 'KKV minősítés nyilatkozat (5/b egyszerűsített)',
      desc: 'Igazolja, hogy mikro- vagy kisvállalkozás. EV-nél és természetes személy tulajdonosú Bt/Kft-nél az egyszerűsített sablon elegendő. Kitöltve és cégszerűen aláírva.',
      link: '/docs/5-b-sz-melleklet-nyilatkozat-kkv-minositeshez-egyszerusitett-sablon.xlsx',
      linkText: 'Sablon letöltése (xlsx)',
      badge: 'req', badgeText: 'Kötelező'
    },
    {
      id: 'deminimis',
      title: 'De minimis nyilatkozat (6. melléklet)',
      desc: 'Csekély összegű támogatásról szóló nyilatkozat. Az elmúlt 3 év de minimis támogatásairól + vállalkozás adatai. Cégszerűen aláírva.',
      link: '/docs/6-sz-melleklet-de-minimis-nyilatkozat.docx',
      linkText: 'Sablon letöltése (docx)',
      badge: 'req', badgeText: 'Kötelező'
    },
    {
      id: 'arkalk',
      title: 'Árkalkuláció PDF',
      desc: 'Az MKIK vallalkozzdigitalisan.mkik.hu oldalán készíthető. Akkreditált beszállítót kell kiválasztani, szoftver részterületeket megadni. A PDF 60 napig érvényes, aláírás nélkül hiteles.',
      link: 'https://vallalkozzdigitalisan.mkik.hu/palyazati_arajanlatok.html',
      linkText: 'Árkalkuláció készítése: MKIK',
      badge: 'req', badgeText: 'Kötelező'
    },
    {
      id: 'dfk',
      title: 'Digitális Fejlesztési Koncepció (DFK)',
      desc: '6M Ft feletti projektnél KÖTELEZŐ! Az MKIK IT szakértője készíti el díjmentesen. Ha benyújtáskor nincs kész, vállalni kell a projekt végéig. PDF formátumban csatolandó.',
      link: 'https://vallalkozzdigitalisan.mkik.hu/ugyfelszolgalataink',
      linkText: 'DFK igénylés: MKIK ügyfélszolgálat',
      badge: 'req', badgeText: 'Kötelező (>=6M Ft)'
    },
    {
      id: 'epapir',
      title: 'EPTK Nyilatkozat + ePapír hitelesítés',
      desc: 'Az online kitöltő program (EPTK) generálja a véglegesítés után. Hitelesíteni kell ePapír szolgáltatással (epapir.gov.hu) vagy e-aláírással. A hitelesített PDF-et vissza kell csatolni az EPTK-ra.',
      link: 'https://epapir.gov.hu',
      linkText: 'ePapír: epapir.gov.hu',
      badge: 'auto', badgeText: 'Benyújtáskor'
    }
  ];

  const STORAGE_KEY = 'dimop-checklist';

  function loadState() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
  }
  function saveState(state) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function render() {
    const state = loadState();
    const container = document.getElementById('checklistCards');
    container.innerHTML = '';

    let doneCount = 0;

    ITEMS.forEach(item => {
      const checked = !!state[item.id];
      if (checked) doneCount++;

      const card = document.createElement('div');
      card.className = 'cl-card' + (checked ? ' done' : '');
      card.innerHTML = `
        <input type="checkbox" ${checked ? 'checked' : ''} data-id="${item.id}">
        <div class="cl-card-body">
          <div class="cl-card-title">${item.title}
            <span class="cl-badge cl-badge-${item.badge}">${item.badgeText}</span>
          </div>
          <div class="cl-card-desc">${item.desc}</div>
          <a href="${item.link}" target="_blank" class="cl-card-link">${item.linkText} &rarr;</a>
        </div>
      `;

      // Click card = toggle checkbox
      card.addEventListener('click', (e) => {
        if (e.target.tagName === 'A') return;
        const cb = card.querySelector('input[type="checkbox"]');
        if (e.target !== cb) cb.checked = !cb.checked;
        const s = loadState();
        s[item.id] = cb.checked;
        saveState(s);
        render();
      });

      container.appendChild(card);
    });

    // Update progress
    const pct = Math.round((doneCount / ITEMS.length) * 100);
    document.getElementById('progressText').textContent = `${doneCount} / ${ITEMS.length} dokumentum kész`;
    document.getElementById('progressFill').style.width = pct + '%';

    // Notes
    const notes = document.getElementById('clNotes');
    if (!notes._initialized) {
      notes.value = state._notes || '';
      notes.addEventListener('input', () => {
        const s = loadState();
        s._notes = notes.value;
        saveState(s);
      });
      notes._initialized = true;
    }
  }

  document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
